apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "musescore-reader.backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "musescore-reader.name" . }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  rules:
    - host: {{ .Values.backend.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "musescore-reader.backend.fullname" . }}
                port:
                  name: http
