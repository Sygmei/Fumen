apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fumen.backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "fumen.name" . }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fumen.name" . }}
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fumen.name" . }}
        app.kubernetes.io/component: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/sygmei/fumen-backend:{{ .Values.backend.version }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu | quote }}
              memory: {{ .Values.backend.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu | quote }}
              memory: {{ .Values.backend.resources.limits.memory | quote }}
          env:
            - name: BIND_ADDRESS
              value: 0.0.0.0:3000
            - name: APP_BASE_URL
              value: https://{{ .Values.frontend.ingress.domain }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ include "fumen.backend.corsAllowedOrigins" . | quote }}
            - name: SUPERADMIN_USERNAME
              value: {{ .Values.backend.superadminUsername | quote }}
            - name: OTEL_ENABLED
              value: {{ .Values.backend.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.backend.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: {{ .Values.backend.otel.tracesEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.backend.otel.serviceName | quote }}
            - name: OTEL_SERVICE_VERSION
              value: {{ .Values.backend.otel.serviceVersion | default .Values.backend.version | quote }}
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.backend.otel.deploymentEnvironment | quote }}
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: {{ .Values.backend.otel.headers | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.backend.otel.resourceAttributes | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string
            - name: DATABASE_URL_ADMIN
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string-admin
            - name: DATABASE_URL_READ_ONLY
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: connection-string-ro
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-credentials
                  key: secret
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: bucket-name
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: secret-key
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: region-name
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-creds
                  key: endpoint-url
            - name: MUSESCORE_DIRECT_OGG_STEMS
              value: {{ .Values.backend.musescoreDirectOggStems | toString | quote }}
          ports:
            - name: http
              containerPort: 3000
          # readinessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: http
          # livenessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: http
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
