apiVersion: v1
kind: Service
metadata:
  name: {{ include "musescore-reader.backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "musescore-reader.name" . }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "musescore-reader.name" . }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 3000
      targetPort: http
