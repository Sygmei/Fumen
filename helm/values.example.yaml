backend:
  version: "1.6.0"
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  corsAllowedOrigins: ""
  superadminUsername: "superadmin"
  musescoreDirectOggStems: true
  otel:
    enabled: true
    serviceName: "fumen-backend"
    serviceVersion: ""
    deploymentEnvironment: "production"
    # Base OTLP HTTP endpoint (for example: "http://observability.yourdomain.com:4318")
    endpoint: "http://observability.yourdomain.com:4318"
    # Optional explicit traces endpoint. Leave empty to use endpoint + /v1/traces.
    tracesEndpoint: ""
    # Optional OTLP headers, serialized as key=value pairs separated by commas.
    headers: ""
    # Optional extra resource attributes, serialized as key=value pairs separated by commas.
    resourceAttributes: ""
  ingress:
    domain: "api.yourdomain.com"

processor:
  enabled: true
  version: "1.6.0"
  replicas: 0
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  minReplicas: 0
  maxReplicas: 5
  leaseSeconds: 600
  heartbeatIntervalMs: 30000
  pollIntervalMs: 10000
  # Leave at 0 to auto-match the pod's available CPU parallelism.
  maxParallelStemRenders: 0
  otel:
    enabled: true
    serviceName: "fumen-processor"
    serviceVersion: ""
    deploymentEnvironment: "production"
    endpoint: "http://observability.yourdomain.com:4318"
    tracesEndpoint: ""
    headers: ""
    resourceAttributes: ""
  keda:
    enabled: true
    # Requires KEDA to already be installed in the cluster, otherwise the chart
    # will skip rendering the ScaledObject and leave the processor Deployment
    # at the configured replica count.
    pollingInterval: 10
    cooldownPeriod: 30
    targetQueryValue: 1
    activationTargetQueryValue: 0

frontend:
  version: "1.6.0"
  apiBaseUrl: ""
  ingress:
    domain: "yourdomain.com"
