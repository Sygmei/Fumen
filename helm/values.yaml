backend:
  version: "1.5.2"
  replicas: 1
  corsAllowedOrigins: ""
  superadminUsername: "superadmin"
  musescoreDirectOggStems: true
  otel:
    enabled: true
    serviceName: "fumen-backend"
    serviceVersion: ""
    deploymentEnvironment: "production"
    # Base OTLP HTTP endpoint (for example: "http://alloy.observability.svc.cluster.local:4318")
    endpoint: "http://alloy.observability.svc.cluster.local:4318"
    # Optional explicit traces endpoint. Leave empty to use endpoint + /v1/traces.
    tracesEndpoint: ""
    # Optional OTLP headers, serialized as key=value pairs separated by commas.
    headers: ""
    # Optional extra resource attributes, serialized as key=value pairs separated by commas.
    resourceAttributes: ""
  ingress:
    domain: "fumen-api.lehang.art"

frontend:
  version: "1.5.2"
  apiBaseUrl: ""
  ingress:
    domain: "fumen.lehang.art"
